apiVersion: v1
kind: ServiceAccount
metadata:
  name: openmodelstudio-api
  namespace: openmodelstudio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openmodelstudio-job-manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openmodelstudio-api-binding
subjects:
  - kind: ServiceAccount
    name: openmodelstudio-api
    namespace: openmodelstudio
roleRef:
  kind: ClusterRole
  name: openmodelstudio-job-manager
  apiGroup: rbac.authorization.k8s.io
